<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Avatar P2P</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>" />
</head>
<body>
  <input type="file" id="upload" accept="image/*" style="position:absolute;z-index:10;" />

  <div id="app">
    <div class="top-bar">
      <div class="room">
        <strong>🆔 Room:</strong>
        <span id="roomId" style="font-family: monospace; color: #42a5f5;">---</span>
      </div>
      <div class="peer">
        <strong>👤 Peer ID:</strong>
        <span id="peerId" style="font-family: monospace; color: #7efcff;">---</span>
      </div>
      <div style="flex:1"></div>
      <button id="startBtn">🎥 Iniciar cámara</button>
      <button id="callBtn" disabled>📞 Llamar</button>
      <button id="hangupBtn" disabled>❌ Colgar</button>
    </div>

    <p id="noteV" style="padding:8px 12px; margin:0"></p>

    <div class="stage">
      <div id="stageIdle" class="stage-idle" aria-hidden="false">
        <div class="stage-idle-icon">👤</div>
        <p class="stage-idle-title">Avatar holográfico P2P</p>
        <p class="stage-idle-hint">Pulsa <strong>Iniciar cámara</strong> y conecta con otro peer para ver su rostro en 3D.</p>
      </div>
      <canvas id="threeCanvas"></canvas>
      <canvas id="overlay2d"></canvas>
      <video id="localVideo" autoplay muted playsinline></video>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh_connections.js"></script>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
